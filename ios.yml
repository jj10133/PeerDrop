targets:
  PeerDrop-iOS:
    type: application
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: 16.0
    settings:
      base:
        INFOPLIST_FILE: app/iOS/Info.plist
    dependencies:
      - framework: frameworks/BareKit.xcframework
      - package: BareKit
      - package: BareRPC
      # - target: AppIOSShare    # uncomment when App Group provisioning is ready
    sources:
      - app/iOS
      - shared
    configFiles:
      Debug: configs/PeerDrop-iOS-Debug.xcconfig
      Release: configs/PeerDrop-iOS-Release.xcconfig
    scheme:
      preActions:
        - name: Link & Pack
          script: |
            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-link" \
              --host darwin-arm64 \
              --host ios-arm64 \
              --host ios-arm64-simulator \
              --out "${PWD}/addons/" \
              "${PWD}"
            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-pack" \
              --host darwin-arm64 \
              --host ios-arm64 \
              --host ios-arm64-simulator \
              --linked \
              --base "${PWD}" \
              --out "${PWD}/app/iOS/app.bundle" \
              "${PWD}/shared/js/app.js"
