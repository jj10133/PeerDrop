targets:
  PeerDrop-iOS-Share:
    type: app-extension
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: 16.0
    settings:
      base:
        PRODUCT_NAME: PeerDrop-iOS-Share
        PRODUCT_BUNDLE_IDENTIFIER: to.foss.peerdrop.ios.share
        INFOPLIST_FILE: app/iOS-Share/Info.plist
        SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: app/iOS-Share/App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.to.foss.peerdrop
    sources:
      - path: app/iOS-Share
        type: group
      - path: shared/swift/AppGroup.swift
      - path: shared/swift/Models/PeerDevice.swift
