targets:
  Vinjari-macOS:
    type: application
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: 13.0
    settings:
      base:
        INFOPLIST_FILE: app/macOS/Info.plist
    dependencies:
      - framework: frameworks/BareKit.xcframework
      - package: BareKit
      - package: BareRPC
    sources:
      - app/macOS
      - shared
    configFiles:
      Debug: configs/PeerDrop-macOS-Debug.xcconfig
      Release: configs/PeerDrop-macOS-Release.xcconfig
    scheme:
      preActions:
        - name: Link & Pack
          script: |
            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-link" \
              --host darwin-arm64 \
              --host ios-arm64 \
              --host ios-arm64-simulator \
              --out "${PWD}/addons/" \
              "${PWD}"
            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-pack" \
              --host darwin-arm64 \
              --host ios-arm64 \
              --host ios-arm64-simulator \
              --linked \
              --base "${PWD}" \
              --out "${PWD}/app/macOS/app.bundle" \
              "${PWD}/shared/js/app.js"
