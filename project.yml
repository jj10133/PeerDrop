name: PeerDrop
include:
  - app/addons/addons.yml
packages:
  BareKit:
    url: https://github.com/holepunchto/bare-kit-swift
    branch: main
  BareRPC:
    url: https://github.com/holepunchto/bare-rpc-swift
    branch: main
targets:
  App:
    type: application
    supportedDestinations: [macOS]
    deploymentTarget:
      macOS: 13.0
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: to.foss.peerdrop
        PRODUCT_NAME: PeerDrop
        SWIFT_VERSION: 5.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        ASSETCATALOG_COMPILER_APPICON_NAME: PeerDrop
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ONLY_ACTIVE_ARCH: NO
        ARCHS: arm64
        VALID_ARCHS: arm64
        EXCLUDED_ARCHS: x86_64
        ENABLE_HARDENED_RUNTIME: YES


    info:
      path: app/Info.plist
      CFBundleDisplayName: "PeerDrop"
      CFBundleShortVersionString: "0.1.0"
      CFBundleVersion: "1"
    entitlements:
      path: app/App.entitlements
      properties:
        # com.apple.security.application-groups:
        #   - group.to.holepunch.bare.ios
        com.apple.security.cs.allow-jit: true
        com.apple.security.get-task-allow: true
        # Hyperswarm: outgoing DHT lookups and peer connections
        com.apple.security.network.client: true
        # Hyperswarm: accepting incoming peer connections
        com.apple.security.network.server: true
        # File access: writing received files to ~/Downloads/PeerDrop
        com.apple.security.files.downloads.read-write: true
        # File access: reading files the user picks/drags to send,
        # and writing to custom download folders chosen via NSOpenPanel
        com.apple.security.files.user-selected.read-write: true
    appIcon: app/Assets.xcassets/AppIcon.imageset
    dependencies:
      - framework: app/frameworks/BareKit.xcframework
      - package: BareKit
      - package: BareRPC
    sources:
      - path: app/App.swift
      - path: app/Assets.xcassets
      - path: app/PeerDrop.icon

      - path: app/js/app.js
        group: app/js
      - path: app/js/transfers.js
      - path: app/js/store.js
      - path: app/js/commands.js

      - path: app/app.bundle
        optional: true

      - path: app/Core/Root/ContentView.swift
        group: app/Core/Root

      - path: app/Core/IPC/Worker.swift
        group: app/Core/IPC
      - path: app/Core/IPC/Worker+Events.swift
      - path: app/Core/IPC/IPCBridge.swift
      - path: app/Core/IPC/Commands.swift

      - path: app/Core/Models/PeerDevice.swift
        group: app/Core/Models
      - path: app/Core/Models/FileTransfer.swift

      - path: app/Core/Settings/SettingsView.swift
        group: app/Core/Settings
      - path: app/Core/Settings/QRCodeView.swift
      - path: app/Core/Settings/DevicePanelController.swift
      - path: app/Core/Settings/DevicePanelView.swift

      - path: app/Core/Components/ActionLink.swift
        group: app/Core/Components
      - path: app/Core/Components/TransferRow.swift
      - path: app/Core/Components/DeviceRow.swift
      - path: app/Core/Components/PanelTransferRow.swift
      - path: app/Core/Components/SectionHeader.swift

    scheme:
      preActions:
        - name: Link & Pack
          script: |
            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-link" \
              --host darwin-arm64 \
              --out ${PWD}/app/addons/ \
              ${PWD}

            PATH="${PATH}" "${PWD}/node_modules/.bin/bare-pack" \
              --host darwin-arm64 \
              --linked \
              --base ${PWD} \
              --out ${PWD}/app/app.bundle \
              ${PWD}/app/js/app.js
